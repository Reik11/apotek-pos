name: Database Scraper Sync

on:
  schedule:
    - cron: '0 */2 * * *' # Jalankan setiap 2 jam sekali (untuk pengecekan dinamis)
  repository_dispatch:
    types: [trigger-scraper]
  workflow_dispatch:
    inputs:
      category:
        description: 'Kategori data yang di-sync (auto/drugs/epidemiology/recall/klb_bpom/all)'
        required: true
        default: 'auto'
      triggeredBy:
        description: 'Nama pemicu sync'
        required: true
        default: 'MANUAL_WORKFLOW'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Scraper Dependencies
        run: |
          cd scrap_api
          npm ci || npm install

      - name: Execute Scraper Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd scrap_api
          # Tentukan kategori dan pemicu berdasarkan event trigger
          CATEGORY="auto"
          TRIGGERED_BY="SYSTEM"
          
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CATEGORY="${{ github.event.client_payload.category }}"
            TRIGGERED_BY="${{ github.event.client_payload.triggeredBy }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CATEGORY="${{ github.event.inputs.category }}"
            TRIGGERED_BY="${{ github.event.inputs.triggeredBy }}"
          fi
          
          node scraper.js --category=$CATEGORY --triggered-by="$TRIGGERED_BY"
