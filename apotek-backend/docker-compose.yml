version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: apotek_postgres
    restart: always
    environment:
      POSTGRES_USER: apotek_user
      POSTGRES_PASSWORD: apotek_password
      POSTGRES_DB: apotek_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apotek_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: